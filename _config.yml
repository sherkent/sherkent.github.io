# 站点配置

# 导入主题
theme: jekyll-theme-chirpy

# 网页语言 › http://www.lingoes.net/en/translator/langcode.htm
# 如果和 `_data/locales` 目录中的某个文件名相同，则布局语言也会跟着变，
# 否则布局语言使用默认的 'en'。
lang: zh-CN

# 设置时区 › https://kevinnovak.github.io/Time-Zone-Picker
timezone: Asia/Shanghai

# jekyll-seo-tag 插件设置 › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: VEIL'S BLOG # 主页标题

tagline: "🌿 抑 趣 | 悠闲的碎片馆"

description: >- # 用于 SEO 元标签和 Atom 订阅源的描述
  抑 趣 | 悠闲的碎片馆，分享数码科技与个人动态的小木屋

# 填写网站协议和域名，例如 'https://username.github.io'，注意不要以 '/' 结尾。
url: "https://sherkent.github.io"

github:
  username: sherkent # 改成你的 GitHub 用户名

twitter:
  username: VeilCode # 改成你的 Twitter 用户名

social:
  # 改成你的全名。
  # 它会作为文章默认作者和页脚版权人显示。
  name: VeilCode
  email: veilcode@qq.com # 改成你的邮箱
  links:
    # 第一个元素作为版权链接
    - https://twitter.com/username # 改成你的 Twitter 主页
    - https://github.com/username # 改成你的 GitHub 主页
    # 以下可取消注释添加更多社交链接
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

# 网站验证设置（站长验证）
webmaster_verifications:
  google: # 填写你的 Google 验证码
  bing: # 填写你的 Bing 验证码
  alexa: # 填写你的 Alexa 验证码
  yandex: # 填写你的 Yandex 验证码
  baidu: # 填写你的百度验证码
  facebook: # 填写你的 Facebook 验证码

# ↑ --------------------------
# jekyll-seo-tag 设置结束

# 网站流量统计设置
analytics:
  google:
    id: # 填写你的 Google Analytics ID
  goatcounter:
    id: # 填写你的 GoatCounter ID
  umami:
    id: # 填写你的 Umami ID
    domain: # 填写你的 Umami 域名
  matomo:
    id: # 填写你的 Matomo ID
    domain: # 填写你的 Matomo 域名
  cloudflare:
    id: # 填写你的 Cloudflare Web Analytics 令牌
  fathom:
    id: # 填写你的 Fathom 网站 ID

# 页面浏览统计设置
pageviews:
  provider: # 目前仅支持 'goatcounter'

# 首选颜色主题设置
#
# 注意：保持空白会跟随系统的首选颜色，
# 并且侧边栏左下角会有开关按钮，切换深色/浅色主题。
#
# 可选项：
#
#     light — 使用浅色主题
#     dark — 使用深色主题
#
theme_mode: # [light | dark]

# 媒体资源的 CDN 端点
# 一旦设置，所有以 '/' 开头的媒体资源（头像、文章图片、音频和视频）路径
# 都会自动添加 CDN 地址作为前缀
#
# 例如 'https://cdn.com'
cdn: "https://chirpy-img.netlify.app"

# 侧边栏头像，支持本地或跨域资源
avatar: "/assets/images/avatar.png"

# 网站全局社交预览图，用于 SEO 的 `og:image` 元标签。
# 可以被页面 front matter 的 `page.image` 覆盖。
social_preview_image: # 字符串，本地或跨域资源

# 帖子目录（TOC）全局开关，布尔类型。
toc: true

comments:
  # 全局评论系统开关。空值表示禁用。
  provider: # [disqus | utterances | giscus]
  # 以下是各个评论服务的配置项：
  disqus:
    shortname: # 填写 Disqus shortname › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances 设置 › https://utteranc.es/
  utterances:
    repo: # <gh-username>/<repo>
    issue_term: # < url | pathname | title | ...>
  # Giscus 设置 › https://giscus.app
  giscus:
    repo: # <gh-username>/<repo>
    repo_id:
    category:
    category_id:
    mapping: # 可选，默认 'pathname'
    strict: # 可选，默认 '0'
    input_position: # 可选，默认 'bottom'
    lang: # 可选，默认使用 `site.lang` 的值
    reactions_enabled: # 可选，默认 '1'

# 自托管静态资源，可选 › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # 布尔值，空值表示 false
    # 指定 Jekyll 环境，空值表示两个环境都启用
    # 只在 `assets.self_host.enabled` 为 true 时生效
    env: # [development | production]

pwa:
  enabled: true # PWA 功能开关（是否允许安装）
  cache:
    enabled: true # 是否启用 PWA 离线缓存
    # 以下路径将被排除在 PWA 缓存之外。
    # 通常是另一个同域网站的 baseurl。
    deny_paths:
      # - "/example"  # 匹配 `<SITE_URL>/example/*` 的 URL 不会被缓存

paginate: 10

# 你的网站基础 URL
baseurl: ""

# ------------ 以下选项一般不建议修改 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge 选项 › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # 空字符串表示对所有文件生效
      type: posts
    values:
      layout: post
      comments: true # 文章默认启用评论
      toc: true # 文章默认显示目录侧栏
      # 除非非常熟悉项目，否则不要修改下面参数
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # 参见 `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/